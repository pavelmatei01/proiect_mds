{% extends "courses/base.html" %}

{% block title %}{{ action }} Course{% endblock %}

{% block content %}
  <h1>{{ action }} Course</h1>
  
  <form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit">Save Course</button>
  </form>
  
  <br>
  <a href="{% url 'course_list' %}">Cancel</a>
{% endblock %}
