{% extends "courses/base.html" %}

{% block title %}Delete {{ course.title }}?{% endblock %}

{% block content %}
  <h1>Confirm Deletion</h1>
  <p>Are you absolutely sure you want to delete the course <strong>"{{ course.title }}"</strong>?</p>
  
  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete it</button>
  </form>
  
  <br>
  <a href="{% url 'course_detail' course.pk %}">Cancel</a>
{% endblock %}
